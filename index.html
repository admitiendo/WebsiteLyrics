<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <script src="js/color-thief.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen p-6 font-sans flex flex-col items-center justify-center">

<!-- Buscar la cancion (Primera fase) -->

<div id="view-search" class="view active max-w-md w-full bg-gray-900 p-8 rounded-2xl">
  <h1 class="text-2xl font-bold mb-4">Buscar Canción</h1>
  <div class="flex gap-2 mb-4">
    <input type="text" id="searchInput" placeholder="Nombre de la canción..." class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700">
    <button onclick="buscarCancion()" class="bg-green-600 px-4 rounded-lg font-bold hover:bg-green-500">Buscar</button>
  </div>
  <div id="resultsList" class="flex flex-col gap-2"></div>
</div>

<!-- Seleccionar la cancion de la lista (Segunda fase) -->

<div id="view-upload" class="view max-w-md w-full bg-gray-900 p-8 rounded-2xl text-center">
  <h2 class="text-xl font-bold mb-4" id="selectedTitle">Canción seleccionada</h2>
  <p class="text-gray-400 mb-4">Duración: <span id="duration"></span> segundos</p>
  <label class="block text-gray-400 mb-4">Ahora selecciona el archivo .mp3 correspondiente:</label>
  <input type="file" id="audioUpload" accept="audio/*" class="w-full p-4 bg-gray-800 rounded-lg cursor-pointer">
</div>

<!-- Mostrar letras -->

<div id="view-player" class="view relative w-full max-w-4xl mx-auto p-8 bg-[#121212] rounded-3xl">

  <button onclick="location.reload()" class="absolute top-4 right-6 text-sm text-gray-400 hover:text-white transition">
    Nueva Búsqueda
  </button>

  <div class="flex flex-col md:flex-row gap-8 items-center mt-6">
    <div class="w-full md:w-1/3 flex flex-col items-center gap-4">
      <img id="albumCover" src="" alt="Portada" class="w-64 h-64 rounded-xl shadow-2xl hidden object-cover border border-gray-800">
      <h2 id="displayTitle" class="text-xl font-semibold text-green-500 text-center px-2"></h2>
    </div>

    <div class="w-full md:w-2/3">
      <div id="lyricsDisplay" class="lyrics-container text-center text-gray-300"></div>

      <div class="mt-8 bg-[#181818] p-6 rounded-2xl shadow-xl flex flex-col items-center">

        <button id="playPauseBtn" class="mb-4 bg-green-500 hover:bg-green-400 text-black rounded-full p-4 transition-transform hover:scale-105">
          <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pauseIcon" xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 hidden" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>

        <input type="range" id="progressBar" value="0" min="0" max="100" step="0.1" class="w-full accent-green-500">
        <div class="flex justify-between w-full text-xs text-gray-400 mt-2">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>
    </div>
  </div>
</div>

<audio id="audioPlayer" class="hidden"></audio>

<script src="js/script.js" defer></script>
</body>
</html>
