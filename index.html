<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebsiteLyrics | admitiendo</title>
  <script src="js/color-thief.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<div id="fallingCoversContainer"
     style="position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;"></div>
<body class="min-h-screen p-6 font-sans flex flex-col items-center justify-center">

<div class="marca-agua">@admitiendo</div>

<!-- Pantalla de carga -->

<div id="loadingScreen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#121212]">
  <div class="relative mb-6">
    <div class="w-20 h-20 border-4 border-green-500 border-t-transparent rounded-full animate-spin"></div>
    <div class="absolute inset-0 flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-green-500" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
      </svg>
    </div>
  </div>
  <p class="text-green-500 font-bold text-xl tracking-widest">WebsiteLyrics</p>
</div>

<!-- Buscar la cancion (Primera fase) -->

<div id="view-search" class="view max-w-md w-full bg-gray-900 p-8 rounded-2xl">
  <h1 class="text-2xl font-bold mb-4">Buscar Canción</h1>
  <div class="flex gap-2 mb-4">
    <input type="text" id="searchInput"
           placeholder="Nombre de la canción..."
           onkeydown="if(event.key==='Enter') buscarCancion()"
           class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700">
    <button onclick="buscarCancion()" class="bg-green-600 px-4 rounded-lg font-bold hover:bg-green-500">Buscar</button>
  </div>
  <div id="resultsList" class="flex flex-col gap-2"></div>
</div>

<!-- Seleccionar la cancion de la lista (Segunda fase) -->

<div id="view-upload" class="view max-w-md w-full bg-gray-900 p-8 rounded-2xl text-center">
  <h2 class="text-xl font-bold mb-4" id="selectedTitle">Canción seleccionada</h2>
  <p class="text-gray-400 mb-4">Duración: <span id="duration"></span> segundos | (tolerancia de 2s) </p>
  <label class="block text-gray-400 mb-4">Ahora selecciona el archivo .mp3 correspondiente:</label>
  <input type="file" id="audioUpload" accept="audio/*" class="w-full p-4 bg-gray-800 rounded-lg cursor-pointer">
</div>

<!-- Segunda animacion -->

<div id="view-ready" class="view">
  <div id="readyFalls" style="position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1;"></div>

  <div style="position:relative;z-index:2;" class="flex flex-col items-center text-center px-6">
    <div class="relative group cursor-pointer mb-8" onclick="startPlaying()">
      <img id="readyAlbumCover" src="" alt="Portada"
           class="w-64 h-64 rounded-2xl shadow-2xl object-cover transition-transform duration-300 group-hover:scale-105">
      <div class="absolute inset-0 rounded-2xl bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 text-white" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </div>
    </div>
    <p class="text-gray-500 text-xs tracking-[0.3em] uppercase mb-3">Toca para reproducir</p>
    <h2 id="readyTitle" class="text-white text-4xl font-bold leading-tight"></h2>
    <p id="readyArtist" class="text-gray-400 text-xl mt-3"></p>
  </div>
</div>

<!-- Mostrar letras -->

<div id="view-player" class="view relative w-full max-w-4xl mx-auto p-8 bg-[#121212] rounded-3xl">

  <button onclick="resetApp()">Nueva Búsqueda</button>

  <div class="flex flex-col md:flex-row gap-8 items-center mt-6">
    <div class="w-full md:w-1/3 flex flex-col items-center gap-4">
      <img id="albumCover" src="" alt="Portada" class="w-64 h-64 rounded-xl shadow-2xl hidden object-cover border border-gray-800">
      <h2 id="displayTitle" class="displayTitleA"></h2>
    </div>

    <div class="w-full md:w-2/3">
      <div id="lyricsDisplay" class="lyrics-container text-center text-gray-300"></div>

      <div class="mt-8 bg-[#181818] p-6 rounded-2xl shadow-xl flex flex-col items-center">

        <button id="playPauseBtn" class="mb-4 bg-green-500 hover:bg-green-400 text-black rounded-full p-4 transition-transform hover:scale-105">
          <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pauseIcon" xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 hidden" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>

        <input type="range" id="progressBar" value="0" min="0" max="100" step="0.1" class="w-full accent-green-500">
        <div class="flex justify-between w-full text-xs text-gray-400 mt-2">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>
    </div>
  </div>
</div>

<audio id="audioPlayer" class="hidden"></audio>

<script src="js/script.js" defer></script>
</body>
</html>
